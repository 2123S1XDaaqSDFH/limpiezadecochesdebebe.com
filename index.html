<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tecnibaby | sistema premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{--brand:#FA008A;}
body{background:#0f0f0f;color:white;font-family:sans-serif}
.btn{background:var(--brand);padding:10px 18px;border-radius:8px}
.input{width:100%;padding:10px;margin:6px 0;background:#111;border:1px solid #333;border-radius:6px}
.card{background:#111;padding:15px;border-radius:10px;margin-top:10px;border:1px solid #222}
.progress{background:#222;height:10px;border-radius:10px;overflow:hidden}
.bar{background:var(--brand);height:10px}
.badge{font-size:11px;background:#222;padding:4px 8px;border-radius:6px}
header{background:#000;position:sticky;top:0;z-index:50}
.hero{min-height:60vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(#0006,#0f0f0f),url('./coches.jpg');background-size:cover;background-position:center}
</style>
</head>

<body>

<header class="p-4 flex justify-between items-center">
  <div class="flex items-center gap-2">
    <img src="./Logo.png" class="h-8">
    <span class="text-lg">tecnibaby</span>
  </div>
  <a href="https://wa.me/573172244861" class="btn text-xs">agendar</a>
</header>

<section class="hero text-center px-4">
  <div>
    <h1 class="text-4xl md:text-6xl mb-4">limpieza premium</h1>
    <p class="text-gray-300">protege la salud de tu bebé</p>
  </div>
</section>

<!-- CREAR PEDIDO -->
<section class="p-6 max-w-xl mx-auto">
<h2 class="text-xl mb-3">Crear pedido</h2>

<form id="form">
<input name="nombre" placeholder="nombre" class="input" required>
<input name="telefono" placeholder="telefono" class="input" required>
<button class="btn w-full">crear pedido</button>
</form>

<p id="pedidoID" class="text-green-400 mt-3"></p>
</section>

<!-- CONSULTAR -->
<section class="p-6 max-w-xl mx-auto">
<h2 class="text-xl mb-3">Consultar pedido</h2>

<input id="buscar" placeholder="ID pedido" class="input">
<button onclick="buscarPedido()" class="btn w-full">buscar</button>

<div id="resultado"></div>
</section>

<!-- DASHBOARD -->
<section class="p-6 max-w-xl mx-auto">
<h2 class="text-xl mb-3">Dashboard Admin</h2>
<div id="admin"></div>
</section>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* 🔴 PEGA TU CONFIG AQUÍ */
const firebaseConfig = {
  apiKey: "AIzaSyCOHS3_iAgeABkBAR2QX3N4_nGRS0EODeA",
  authDomain: "tecnibaby-48685.firebaseapp.com",
  projectId: "tecnibaby-48685",
  storageBucket: "tecnibaby-48685.firebasestorage.app",
  messagingSenderId: "916599434497",
  appId: "1:916599434497:web:62d8fd885933b0b45d7f00",
  measurementId: "G-RMV31FVJ12"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CREAR PEDIDO */
document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let nombre = e.target.nombre.value;
let telefono = e.target.telefono.value;

let id = "TB-" + Math.floor(Math.random()*999999);

await setDoc(doc(db,"pedidos",id),{
id,
nombre,
telefono,
estado:0,
fecha:new Date()
});

document.getElementById("pedidoID").innerText = "ID generado: "+id;

e.target.reset();
});

/* BUSCAR */
window.buscarPedido = async function(){

let id = document.getElementById("buscar").value;

let ref = doc(db,"pedidos",id);
let snap = await getDoc(ref);

if(!snap.exists()){
document.getElementById("resultado").innerHTML="No encontrado";
return;
}

let data = snap.data();

let estados=[
"Recogido",
"En mantenimiento",
"Lavándose",
"Empaquetado",
"En camino",
"Entregado"
];

let progreso=(data.estado/5)*100;

document.getElementById("resultado").innerHTML=`
<div class="card">
<p><b>${data.nombre}</b></p>
<p>${data.telefono}</p>
<p class="badge mt-2">${estados[data.estado]}</p>

<div class="progress mt-3">
<div class="bar" style="width:${progreso}%"></div>
</div>
</div>
`;
}

/* DASHBOARD */
onSnapshot(collection(db,"pedidos"), (snapshot)=>{
let html="";
snapshot.forEach(docu=>{
let p=docu.data();

html+=`
<div class="card">
<p>${p.nombre} - ${p.telefono}</p>
<p>ID: ${p.id}</p>

<button onclick="window.updateEstado('${p.id}',${p.estado})" class="btn mt-2 text-xs">
avanzar estado
</button>
</div>
`;
});
document.getElementById("admin").innerHTML=html;
});

/* UPDATE */
window.updateEstado = async function(id,estado){
let nuevo=estado+1;
if(nuevo>5) nuevo=5;

await updateDoc(doc(db,"pedidos",id),{
estado:nuevo
});
}

</script>

</body>
</html>
